<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transiberiana d'Abruzzo - Le Fermate</title>
    <link rel="stylesheet" href="/style/layout.css">
    <link rel="stylesheet" href="/style/fermate.css">
    <link rel="stylesheet" href="/style/journey.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-inner">
            <a href="/" class="nav-logo">
                <span class="logo-icon">🚂</span>
                <span>Transiberiana<br><small>d'Abruzzo</small></span>
            </a>
            <div class="nav-actions">
                <ul class="nav-links">
                    <li><a href="/" class="nav-link" data-i18n="nav.home">Home</a></li>
                    <li><a href="/storia.html" class="nav-link" data-i18n="nav.storia">La Storia</a></li>
                    <li><a href="/fermate.html" class="nav-link" data-i18n="nav.fermate">Le Fermate</a></li>
                    <li><a href="/come-salire.html" class="nav-link" data-i18n="nav.salire">Come Salire</a></li>
                    <li><a href="/info-utili.html" class="nav-link" data-i18n="nav.info">Info Utili</a></li>
                    <li><a href="/meteo.html" class="nav-link" data-i18n="nav.meteo">Meteo Live</a></li>
                </ul>
                <div class="nav-controls">
                    <button class="control-btn" id="theme-toggle" title="Cambia Tema">🌓</button>
                    <button class="control-btn" id="lang-toggle" title="Switch Language">🇮🇹</button>
                </div>
            </div>
            <button class="nav-toggle" type="button" aria-label="Apri menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main class="container section">
        <div class="section-header">
            <h1 class="section-title">Le Tre Fermate</h1>
            <p class="section-desc">Viaggiando tra i borghi più belli dell'Appennino.</p>
        </div>

        <section class="journey-full" id="journey" aria-label="Viaggio interattivo (scroll)">
            <div class="journey-full-bg" aria-hidden="true"></div>
            <div class="journey-full-vignette" aria-hidden="true"></div>

            <div class="journey-full-ui" aria-hidden="true">
                <div class="journey-path">
                    <svg class="journey-path-svg" viewBox="0 0 200 720" preserveAspectRatio="none">
                        <path id="journey-path-line"
                              d="M110 20 C70 110, 150 210, 92 300 C35 390, 135 470, 80 560 C25 650, 95 695, 120 705"
                              fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                    <div class="journey-marker" data-stop="sulmona"></div>
                    <div class="journey-marker" data-stop="castel"></div>
                    <div class="journey-marker" data-stop="campo"></div>
                    <div class="journey-walker" id="journey-walker">🚶</div>
                </div>

                <div class="journey-overlay" id="journey-popup" aria-live="polite">
                    <div class="journey-overlay-media">
                        <img id="journey-popup-img" alt="" decoding="async">
                    </div>
                    <div class="journey-overlay-body">
                        <div class="journey-overlay-tag" id="journey-popup-tag"></div>
                        <div class="journey-overlay-title" id="journey-popup-title"></div>
                        <div class="journey-overlay-text" id="journey-popup-text"></div>
                    </div>
                </div>
            </div>
        </section>

        <div class="journey-scrollspace" aria-hidden="true"></div>

        <div class="fermate-grid fermate-grid--fallback" id="fermate-grid">
            <!-- Cards will be injected by src/main.js -->
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Transiberiana d'Abruzzo</p>
            </div>
        </div>
    </footer>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
